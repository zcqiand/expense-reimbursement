name: CI

# 第 15 章「自动化测试与 CI/CD」的实物：每个 PR / push 跑后端 Maven verify
# 与前端 Vite build，把「合入即通过」变成机器强制约束而非口头约定。
#
# 两个 job 并行：
# - backend：JDK 21 + Maven，缓存 ~/.m2 加速二次构建，跑 `mvn verify`（含测试）
# - frontend：Node 20 + npm，缓存 node_modules，跑 `npm ci` + `npm run build`
#   （package.json 的 build 是 `tsc -b && vite build`，含类型检查）
#
# 前端没有 test 脚本（package.json 只有 dev/build/preview/typecheck），
# 所以 CI 只跑 build——类型错误会让 tsc 失败、从而让整个 build 失败。

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (Java 21 + Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build & test (mvn -B -ntp verify)
        run: mvn -B -ntp verify

  frontend:
    name: Frontend (Node 20 + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Build (tsc -b && vite build)
        run: npm run build
